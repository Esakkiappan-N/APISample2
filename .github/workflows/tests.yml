name: Full Test Automation (API + Web + Mobile)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # ✅ 1. CHECKOUT CODE
    # =========================
    - name: Checkout code
      uses: actions/checkout@v3

    # =========================
    # ✅ 2. PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # =========================
    # ✅ 3. INSTALL DEPENDENCIES
    # =========================
    - name: Install dependencies
      run: |
        pip install -r test_framework/requirements.txt
        pip install playwright

    # =========================
    # ✅ 4. INSTALL PLAYWRIGHT
    # =========================
    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps

    # =========================
    # ✅ 5. RUN API + WEB TESTS
    # =========================
    - name: Run API & Web Tests
      run: |
        pytest test_framework/tests/api test_framework/tests/web --alluredir=allure-results

    # =========================
    # 📱 MOBILE SETUP STARTS
    # =========================

    # ✅ 6. JAVA (REQUIRED)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ 7. ANDROID SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ✅ 8. INSTALL REQUIRED SDK TOOLS (FIXED)
    - name: Install Android SDK Components
      run: |
        yes | sdkmanager --licenses
        sdkmanager --install "platform-tools" "emulator" "system-images;android-30;google_apis;x86_64"

    # ✅ 9. CREATE EMULATOR
    - name: Create Emulator
      run: |
        echo "no" | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64" --force

    # ✅ 10. START EMULATOR (FIXED)
    - name: Start Emulator
      run: |
        nohup $ANDROID_HOME/emulator/emulator -avd test -no-window -no-audio -no-boot-anim &
        adb wait-for-device
        echo "Waiting for emulator to boot..."
        until adb shell getprop sys.boot_completed | grep "1"; do sleep 5; done
        adb shell input keyevent 82
        adb devices

    # =========================
    # ✅ NODE + APPIUM
    # =========================
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # ✅ START APPIUM (WITH WAIT)
    - name: Start Appium Server
      run: |
        nohup appium &
        sleep 20

    # =========================
    # ✅ INSTALL YOUR APK
    # =========================
    - name: Install APK
      run: |
        adb install tapps/app-release-4-3-26.apk

    # =========================
    # ✅ RUN MOBILE TESTS
    # =========================
    - name: Run Mobile Tests
      run: |
        pytest test_framework/tests/mobile --alluredir=allure-results
