name: Full Test Automation (API + Web + Mobile - Real Device)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: self-hosted   # ✅ Must be your local machine

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ================= PYTHON =================

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install -r test_framework/requirements.txt
        pip install playwright pytest allure-pytest

    - name: Install Playwright Browsers
      run: |
        python -m playwright install

    # ================= API + WEB =================

    - name: Run API & Web Tests
      run: |
        pytest test_framework/tests/api test_framework/tests/web --alluredir=allure-results

    # ================= MOBILE SETUP =================

    # ✅ Add platform-tools to PATH
    - name: Add ADB to PATH
      run: |
        echo "${{ github.workspace }}/platform-tools" >> $GITHUB_PATH

    - name: Check ADB Version
      run: adb version

    - name: Check connected devices
      run: |
        adb kill-server
        adb start-server
        adb devices

    # ================= NODE + APPIUM =================

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Appium & Driver
      run: |
        npm install -g appium
        appium driver install uiautomator2
        appium driver list --installed

    # ================= START APPIUM =================

    - name: Start Appium Server
      run: |
        nohup appium --log-level info &
        sleep 20

    # ================= MOBILE TEST =================

    - name: Run Mobile Tests (Real Device)
      run: |
        pytest test_framework/tests/mobile --alluredir=allure-results
