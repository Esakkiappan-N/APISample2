name: Full Test Automation (API + Web + Mobile - Real Device)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: self-hosted   # ✅ IMPORTANT (not ubuntu-latest)

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ================= PYTHON SETUP =================

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      run: |
        pip install -r test_framework/requirements.txt
        pip install playwright pytest allure-pytest

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps

    # ================= API + WEB =================

    - name: Run API & Web Tests
      run: |
        pytest test_framework/tests/api test_framework/tests/web --alluredir=allure-results

    # ================= MOBILE SETUP =================

    - name: Check connected devices
      run: |
        adb devices

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server
      run: |
        nohup appium --log-level info &
        sleep 15

    # ================= MOBILE TEST =================

    - name: Run Mobile Tests (Real Device)
      run: |
        pytest test_framework/tests/mobile --alluredir=allure-results
