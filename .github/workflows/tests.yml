name: Full Test Automation (API + Web + Mobile)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install -r test_framework/requirements.txt
        pip install playwright

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps

    # ✅ FIXED: Web + API
    - name: Run API & Web Tests
      run: |
        pytest test_framework/tests/api test_framework/tests/web --alluredir=allure-results

    # ================= MOBILE =================

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Emulator
      run: |
        sdkmanager "system-images;android-30;google_apis;x86_64"
        echo "no" | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64" --force

    # ✅ FIXED: Boot wait
    - name: Start Emulator
      run: |
        nohup emulator -avd test -no-window -no-audio -no-boot-anim &
        adb wait-for-device
        echo "Waiting for emulator..."
        until adb shell getprop sys.boot_completed | grep "1"; do
          sleep 5
        done
        adb shell input keyevent 82
        adb devices

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    # ✅ FIXED: wait added
    - name: Start Appium Server
      run: |
        nohup appium &
        sleep 15

    - name: Run Mobile Tests
      run: |
        pytest test_framework/tests/mobile --alluredir=allure-results
